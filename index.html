<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Comps">
<meta name="theme-color" content="#0f1117">
<title>JLL Comps Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0f1117;color:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;font-size:14px;padding-bottom:80px}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;background:#1a1d27;border-top:1px solid #2a2d3a;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;border:none;background:none;color:#6b7280;font-size:10px;cursor:pointer}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2}
.nav-btn.active{color:#c8a84b}

/* HEADER */
.hdr{background:#1a1d27;border-bottom:1px solid #2a2d3a;padding:16px 16px 12px;position:sticky;top:0;z-index:50}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hdr h1{font-size:18px;font-weight:700;color:#c8a84b;letter-spacing:.3px}
.badge{background:#2a2d3a;color:#94a3b8;font-size:11px;padding:3px 8px;border-radius:10px}

/* SEARCH */
.search{width:100%;background:#0f1117;border:1px solid #2a2d3a;border-radius:10px;padding:9px 12px;color:#f1f5f9;font-size:14px;outline:none;margin-bottom:8px;-webkit-appearance:none}
.search::placeholder{color:#6b7280}

/* FILTERS */
.filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.fsel{background:#0f1117;border:1px solid #2a2d3a;color:#94a3b8;font-size:12px;padding:6px 10px;border-radius:8px;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none}

/* SUB-TABS */
.tabs{display:flex;border-bottom:1px solid #2a2d3a;margin:0 16px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 16px;font-size:13px;font-weight:500;color:#6b7280;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab.on{color:#c8a84b;border-bottom-color:#c8a84b}

/* CARDS */
.list{padding:12px 12px 0}
.card{background:#1a1d27;border:1px solid #2a2d3a;border-radius:12px;padding:12px;margin-bottom:10px;cursor:pointer}
.card:active{border-color:#c8a84b}
.card-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card-addr{font-size:14px;font-weight:600;color:#f1f5f9;line-height:1.3;flex:1}
.card-price{font-size:14px;font-weight:700;color:#c8a84b;white-space:nowrap}
.card-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.pill{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:500}
.p-blue{background:#1e3a5f;color:#93c5fd}
.p-green{background:#14532d;color:#86efac}
.p-gold{background:#422006;color:#fcd34d}
.p-gray{background:#1e2130;color:#94a3b8}
.p-uc{background:#1a2a3a;color:#60a5fa}
.p-awd{background:#1a3a2a;color:#4ade80}
.p-mkt{background:#2a1a3a;color:#c084fc}
.card-sub{font-size:12px;color:#6b7280;margin-top:5px}
.card-note{font-size:12px;color:#94a3b8;margin-top:5px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* MODAL */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:999;display:none;align-items:flex-end}
.overlay.open{display:flex}
.sheet{background:#1a1d27;border-radius:20px 20px 0 0;width:100%;max-height:82vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 env(safe-area-inset-bottom)}
.handle{width:40px;height:4px;background:#2a2d3a;border-radius:2px;margin:12px auto 8px}
.sheet-title{font-size:17px;font-weight:700;padding:0 16px 4px;color:#f1f5f9;line-height:1.3}
.sheet-city{font-size:13px;color:#6b7280;padding:0 16px 14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 14px}
.stat-box{background:#0f1117;border-radius:10px;padding:10px}
.stat-lbl{font-size:11px;color:#6b7280;margin-bottom:3px}
.stat-num{font-size:15px;font-weight:600;color:#f1f5f9}
.fields{padding:0 16px}
.field{margin-bottom:10px}
.field-lbl{font-size:11px;color:#6b7280;margin-bottom:2px}
.field-val{font-size:13px;color:#f1f5f9;line-height:1.4}
.note-box{font-size:12px;color:#94a3b8;background:#0f1117;border-radius:8px;padding:10px 12px;line-height:1.5;margin:0 16px 14px}
.close-btn{width:calc(100% - 32px);margin:8px 16px 16px;padding:14px;background:#2a2d3a;border:none;border-radius:12px;color:#f1f5f9;font-size:15px;font-weight:600;cursor:pointer}

.empty{text-align:center;padding:60px 20px;color:#6b7280;font-size:13px}
.card-parties{display:flex;flex-wrap:wrap;gap:8px;margin-top:5px}
.party-item{font-size:12px;color:#94a3b8}
.party-lbl{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.04em;margin-right:2px}
.card-tenant{font-size:12px;color:#94a3b8;margin-top:4px;margin-bottom:4px}
.card-landlord{color:#6b7280}
.card-addr-city{font-weight:400;color:#94a3b8;font-size:13px}
</style>

</head>

let saleTab='sold';
let fSale=[], fLease=[];

// ── SECTION SWITCH ────────────────────────────────────────────────────────────
function switchSec(s){
  document.getElementById('sec-sale').style.display  = s==='sale'  ? '' : 'none';
  document.getElementById('sec-lease').style.display = s==='lease' ? '' : 'none';
  document.getElementById('nav-sale').classList.toggle('active', s==='sale');
  document.getElementById('nav-lease').classList.toggle('active', s==='lease');
  if(s==='lease') renderLease();
}

// ── SALE TAB ──────────────────────────────────────────────────────────────────
function setTab(tab, btn){
  saleTab = tab;
  document.querySelectorAll('#sale-tabs .tab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderSale();
}

function isActive(sd){
  if(!sd) return false;
  const d = sd.toLowerCase();
  return d==='under contract'||d==='awarded'||d==='marketing'||d==='pending'||d==='u/c';
}

function getYear(sd){
  if(!sd) return '';
  const p = sd.split('/');
  if(p.length===3) return p[2];
  if(/^\d{4}$/.test(sd.trim())) return sd.trim();
  return '';
}

function renderSale(){
  const q   = (document.getElementById('sale-q').value||'').toLowerCase();
  const sub = document.getElementById('f-sub').value;
  const st  = document.getElementById('f-st').value;
  const yr  = document.getElementById('f-yr').value;

  // Select data pool by tab
  let pool;
  if(saleTab==='ios'){
    pool = IOS;
  } else {
    // Exclude marketing from all existing tabs
    const noMkt = EXISTING.filter(e => !(e.saleDate||'').toLowerCase().includes('marketing'));
    if(saleTab==='sold')     pool = noMkt.filter(e => !isActive(e.saleDate));
    else if(saleTab==='uc')  pool = noMkt.filter(e => (e.saleDate||'').toLowerCase().includes('under contract'));
    else if(saleTab==='awarded') pool = noMkt.filter(e => (e.saleDate||'').toLowerCase().includes('awarded'));
    else pool = noMkt;
  }

  // Apply filters
  fSale = pool.filter((e,i) => {
    e._idx = i;
    if(sub && e.submarket !== sub) return false;
    if(st  && e.state !== st)      return false;
    if(yr){
      const ey = getYear(e.saleDate||'');
      const active = isActive(e.saleDate||'');
      if(yr==='Active' && !active) return false;
      if(yr!=='Active' && ey !== yr) return false;
    }
    if(q){
      const hay = [e.address,e.city,e.buyer,e.seller,e.tenants,e.submarket,e.comments,e.broker].filter(Boolean).join(' ').toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });

  document.getElementById('sale-badge').textContent = fSale.length + ' comps';

  if(!fSale.length){ document.getElementById('sale-list').innerHTML='<div class="empty">No comps match your filters</div>'; return; }

  document.getElementById('sale-list').innerHTML = fSale.map((e,i) => {
    const active = isActive(e.saleDate||'');
    let datePill = '';
    const sdl = (e.saleDate||'').toLowerCase();
    if(sdl.includes('under contract')) datePill = '<span class="pill p-uc">Under Contract</span>';
    else if(sdl.includes('awarded'))   datePill = '<span class="pill p-awd">Awarded</span>';
    else if(e.saleDate)                datePill = '<span class="pill p-gray">' + e.saleDate + '</span>';

    const psfPill  = e.psf  ? '<span class="pill p-gold">'  + e.psf  + '/sf</span>' : '';
    const capPill  = e.capRate ? '<span class="pill p-green">' + e.capRate + '</span>' : '';
    const clsPill  = e.class  ? '<span class="pill p-blue">Class ' + e.class + '</span>' : '';
    const sf       = e.rsf ? Number(e.rsf).toLocaleString() + ' SF' : '';
    const meta     = [e.city && e.state ? e.city+', '+e.state : e.city||'', sf, e.clearHeight ? e.clearHeight+"' clear" : '', e.yrBuilt ? 'Built '+e.yrBuilt : ''].filter(Boolean).join(' · ');

    return '<div class="card" onclick="showSale(' + i + ')">'
      + '<div class="card-row"><div class="card-addr">' + esc(e.address) + '</div>'
      + (e.price ? '<div class="card-price">' + e.price + '</div>' : '')
      + '</div>'
      + '<div class="card-meta">' + datePill + psfPill + capPill + clsPill + '</div>'
      + '<div class="card-sub">' + esc(meta) + '</div>'
      + (e.buyer || e.seller ? '<div class="card-parties">' 
          + (e.buyer  ? '<span class="party-item"><span class="party-lbl">Buyer</span> ' + esc(e.buyer)  + '</span>' : '')
          + (e.seller ? '<span class="party-item"><span class="party-lbl">Seller</span> ' + esc(e.seller) + '</span>' : '')
          + '</div>' : '')
      + (e.comments ? '<div class="card-note">' + esc(e.comments) + '</div>' : '')
      + '</div>';
  }).join('');
}

function showSale(i){
  const e = fSale[i];
  if(!e) return;
  const rows = [
    ['Sale Date', e.saleDate], ['Price', e.price], ['PSF', e.psf], ['Cap Rate', e.capRate],
    ['WALT', e.walt ? e.walt+' yrs' : ''], ['Size', e.rsf ? Number(e.rsf).toLocaleString()+' SF' : ''],
    ['Class', e.class ? 'Class '+e.class : ''], ['Type', e.type], ['Submarket', e.submarket],
    ['Year Built', e.yrBuilt], ['Clear Height', e.clearHeight ? e.clearHeight+"'" : ''],
    ['Occupancy', e.occupancy], ['Buyer', e.buyer], ['Seller', e.seller],
    ['Tenants', e.tenants], ['Broker', e.broker],
  ].filter(([,v]) => v && String(v).trim() && v !== 'undefined');

  const top4 = rows.slice(0,4);
  const rest = rows.slice(4);

  document.getElementById('sheet-body').innerHTML =
    '<div class="sheet-title">' + esc(e.address) + '</div>'
    + '<div class="sheet-city">' + esc([e.city,e.state].filter(Boolean).join(', ')) + '</div>'
    + '<div class="grid2">'
    + top4.map(([l,v]) => '<div class="stat-box"><div class="stat-lbl">'+esc(l)+'</div><div class="stat-num">'+esc(String(v))+'</div></div>').join('')
    + '</div>'
    + '<div class="fields">'
    + rest.map(([l,v]) => '<div class="field"><div class="field-lbl">'+esc(l)+'</div><div class="field-val">'+esc(String(v))+'</div></div>').join('')
    + '</div>'
    + (e.comments ? '<div class="note-box">' + esc(e.comments) + '</div>' : '');

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

// ── LEASE COMPS ───────────────────────────────────────────────────────────────
let leaseMkt = 'All';
function setLeaseMkt(m, btn){
  leaseMkt = m;
  document.querySelectorAll('#lease-mkt-tabs .tab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderLease();
}

function renderLease(){
  const q   = (document.getElementById('lease-q').value||'').toLowerCase();
  const mkt = leaseMkt !== 'All' ? leaseMkt : document.getElementById('f-lmkt').value;
  const typ = document.getElementById('f-ltyp').value;
  const yr  = document.getElementById('f-lyr').value;

  fLease = LEASES.filter((l,i) => {
    l._idx = i;
    if(mkt && l.market !== mkt) return false;
    if(typ && l.transaction !== typ) return false;
    if(yr){
      const sd = l.signDate||'';
      if(yr==='PENDING'){ if(sd!=='PENDING') return false; }
      else{
        const ly = sd.includes('/') ? sd.split('/').pop() : sd.split('-')[0];
        if(ly !== yr) return false;
      }
    }
    if(q){
      const hay = [l.tenant,l.address,l.city,l.landlord,l.market].filter(Boolean).join(' ').toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });

  document.getElementById('lease-badge').textContent = fLease.length + ' comps';

  if(!fLease.length){ document.getElementById('lease-list').innerHTML='<div class="empty">No comps match your filters</div>'; return; }

  document.getElementById('lease-list').innerHTML = fLease.map((l,i) => {
    const pending = l.signDate==='PENDING';
    const datePill = pending
      ? '<span class="pill p-mkt">Pending</span>'
      : (l.signDate ? '<span class="pill p-gray">'+esc(l.signDate)+'</span>' : '');
    const rentPill = l.rent ? '<span class="pill p-gold">'+esc(l.rent)+'/sf '+(l.leaseType||'')+'</span>' : '';
    const mktPill  = l.market ? '<span class="pill p-blue">'+esc(l.market)+'</span>' : '';
    const typPill  = l.transaction ? '<span class="pill p-gray">'+esc(l.transaction)+'</span>' : '';
    const sub = [l.address, l.city, l.landlord].filter(Boolean).join(', ');

    const sfBig = l.sf ? l.sf + ' SF' : '';
    return '<div class="card" onclick="showLease(' + i + ')">'
      + '<div class="card-row">'
      + '<div class="card-addr">' + esc(l.address) + (l.city ? '<span class="card-addr-city">, ' + esc(l.city) + '</span>' : '') + '</div>'
      + (sfBig ? '<div class="card-price">' + esc(sfBig) + '</div>' : '')
      + '</div>'
      + '<div class="card-tenant">' + esc(l.tenant) + (l.landlord ? ' <span class="card-landlord">· ' + esc(l.landlord) + '</span>' : '') + '</div>'
      + '<div class="card-meta">' + datePill + rentPill + mktPill + typPill + '</div>'
      + (l.notes ? '<div class="card-note">'+esc(l.notes)+'</div>' : '')
      + '</div>';
  }).join('');
}

function showLease(i){
  const l = fLease[i];
  if(!l) return;
  const rows = [
    ['Sign Date', l.signDate], ['LCD', l.lcd], ['Term', l.term ? l.term+' mos' : ''],
    ['Rent', l.rent ? l.rent+'/sf' : ''], ['Lease Type', l.leaseType],
    ['Size', l.sf ? l.sf+' SF' : ''], ['Escalation', l.escalation],
    ['Free Rent', l.freeRent], ['TIA', l.tia ? l.tia+'/sf' : ''],
    ['Market', l.market], ['Landlord', l.landlord], ['Transaction', l.transaction],
  ].filter(([,v]) => v && String(v).trim());

  const top4 = rows.slice(0,4);
  const rest = rows.slice(4);

  document.getElementById('sheet-body').innerHTML =
    '<div class="sheet-title">' + esc(l.tenant) + '</div>'
    + '<div class="sheet-city">' + esc(l.address + ', ' + l.city) + '</div>'
    + '<div class="grid2">'
    + top4.map(([lb,v]) => '<div class="stat-box"><div class="stat-lbl">'+esc(lb)+'</div><div class="stat-num">'+esc(String(v))+'</div></div>').join('')
    + '</div>'
    + '<div class="fields">'
    + rest.map(([lb,v]) => '<div class="field"><div class="field-lbl">'+esc(lb)+'</div><div class="field-val">'+esc(String(v))+'</div></div>').join('')
    + '</div>'
    + (l.notes ? '<div class="note-box">'+esc(l.notes)+'</div>' : '');

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

// ── MODAL CLOSE ───────────────────────────────────────────────────────────────
function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function esc(s){
  return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderSale();
</script>
